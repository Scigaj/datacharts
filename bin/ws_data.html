<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local JSON — connection only</title>
<script src="ws-client.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #333; padding: 24px; height: 100vh; display: flex; flex-direction: column;
  }
  #header { flex-shrink: 0; margin-bottom: 12px; }
  #title { font-size: 18px; font-weight: 700; }
  #ws-status { font-size: 12px; color: #666; margin-top: 4px; }
  #raw { flex: 1; min-height: 0; overflow: auto; background: #f5f5f5; padding: 12px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
</style>
</head>
<body>

<div id="header">
  <div id="title">Local JSON (connection only)</div>
  <div id="ws-status">Connecting…</div>
</div>

<pre id="raw">No data yet. Start listener.py and ensure the JSON file exists.</pre>

<script>
window.onWSData = function(data, error) {
  const el = document.getElementById("raw");
  if (error) {
    el.textContent = "Error: " + error;
    return;
  }
  el.textContent = data == null ? "No data" : JSON.stringify(data, null, 2);
};
</script>
</body>
</html>
