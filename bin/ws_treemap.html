<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Local JSON — D3 Treemap</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="ws-client.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #333; padding: 24px; height: 100vh; display: flex; flex-direction: column;
  }
  #header { margin-bottom: 20px; flex-shrink: 0; }
  #title { font-size: 22px; font-weight: 700; color: #111; }
  #subtitle { font-size: 14px; color: #666; margin-top: 4px; }
  #ws-status { font-size: 12px; color: #888; margin-top: 6px; }

  #chart-wrap { flex: 1; min-height: 0; position: relative; }
  svg { display: block; width: 100%; height: 100%; }

  .node rect { stroke: #fff; stroke-width: 2px; cursor: pointer; }
  .node text { pointer-events: none; fill: #fff; }
  .parent-label { font-size: 11px; font-weight: bold; fill: #555; text-transform: uppercase; letter-spacing: 0.05em; }

  #tooltip {
    position: absolute; background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    padding: 8px 12px; border-radius: 4px; pointer-events: none; opacity: 0;
    font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
    transition: opacity 0.2s;
  }
  .tt-name { font-weight: 700; color: #111; margin-bottom: 2px; }
  .tt-val { color: #555; font-size: 11px; }
</style>
</head>
<body>

<div id="header">
  <div id="title">Local JSON — D3 Treemap</div>
  <div id="subtitle">Data from listener.py (watched JSON file)</div>
  <div id="ws-status">Connecting…</div>
</div>

<div id="chart-wrap">
  <svg id="chart"></svg>
</div>

<div id="tooltip"></div>

<script>
const color = d3.scaleOrdinal(d3.schemeTableau10);
const svg = d3.select("#chart");
const tooltip = d3.select("#tooltip");

function showTT(e, name, val, group) {
  tooltip.style("opacity", 1)
    .html(`<div class="tt-name">${name}</div><div class="tt-val">Value: ${val}</div><div class="tt-val">Group: ${group || "—"}</div>`);
  moveTT(e);
}
function moveTT(e) {
  tooltip.style("left", (e.pageX + 15) + "px").style("top", (e.pageY - 15) + "px");
}
function hideTT() { tooltip.style("opacity", 0); }

function buildHierarchyFromFlat(data) {
  const childNames = new Set(data.map(d => d.name));
  const missing = [...new Set(data.map(d => d.parent).filter(Boolean))].filter(p => !childNames.has(p));
  const allNodes = [
    { name: "Total", parent: null },
    ...missing.map(p => ({ name: p, parent: "Total", value: 0 })),
    ...data.map(d => ({ ...d, parent: d.parent || "Total" }))
  ];
  return d3.stratify().id(d => d.name).parentId(d => d.parent)(allNodes)
    .sum(d => (d.value != null ? Number(d.value) : 0)).sort((a, b) => b.value - a.value);
}

function buildHierarchyFromNested(data) {
  return d3.hierarchy(data).sum(d => (d.value != null ? Number(d.value) : 0)).sort((a, b) => b.value - a.value);
}

function normalizeToRoot(obj) {
  if (Array.isArray(obj)) return { name: "root", children: obj };
  if (obj && typeof obj === "object" && (obj.children || obj.name))
    return obj.children ? obj : { name: "root", children: [obj] };
  return { name: "root", children: [] };
}

function buildRoot(data) {
  if (!data || data.error) return null;
  if (Array.isArray(data) && data.length > 0 && data[0].name != null && (data[0].parent != null || data[0].value != null))
    return buildHierarchyFromFlat(data);
  return buildHierarchyFromNested(normalizeToRoot(data));
}

let lastDataRoot = null;

function render(dataRoot) {
  const W = document.getElementById("chart-wrap").clientWidth;
  const H = document.getElementById("chart-wrap").clientHeight;
  if (W === 0 || H === 0) return;

  if (dataRoot) lastDataRoot = dataRoot;
  svg.attr("width", W).attr("height", H);
  svg.selectAll("*").remove();

  const root = dataRoot != null ? dataRoot : lastDataRoot;
  if (!root || !root.leaves || root.leaves().length === 0) {
    svg.append("text").attr("x", W / 2).attr("y", H / 2).attr("text-anchor", "middle").style("fill", "#999")
      .text("No data to display");
    return;
  }

  d3.treemap().size([W, H]).paddingOuter(4).paddingTop(22).paddingInner(2).round(true)(root);

  svg.selectAll(".parent-label")
    .data(root.children || [])
    .join("text")
    .attr("class", "parent-label")
    .attr("x", d => d.x0 + 4)
    .attr("y", d => d.y0 + 14)
    .text(d => d.data.name);

  const leaves = svg.selectAll(".node")
    .data(root.leaves(), d => d.data.name)
    .join(enter => {
      const g = enter.append("g").attr("class", "node");
      g.append("rect").attr("rx", 3).attr("width", 0).attr("height", 0);
      return g;
    });

  leaves.transition().duration(600).ease(d3.easeCubicOut)
    .attr("transform", d => `translate(${d.x0},${d.y0})`);

  leaves.select("rect")
    .attr("fill", d => color((d.parent && d.parent.data) ? d.parent.data.name : "root"))
    .on("mouseover", (e, d) => showTT(e, d.data.name, d.value, (d.parent && d.parent.data) ? d.parent.data.name : null))
    .on("mousemove", moveTT)
    .on("mouseout", hideTT)
    .transition().duration(600).ease(d3.easeCubicOut)
    .attr("width", d => Math.max(0, d.x1 - d.x0))
    .attr("height", d => Math.max(0, d.y1 - d.y0));

  leaves.each(function(d) {
    const g = d3.select(this);
    const w = d.x1 - d.x0, h = d.y1 - d.y0;
    g.selectAll("text").remove();
    if (w > 60 && h > 40) {
      g.append("text").attr("x", 8).attr("y", 18).style("font-size", "12px").style("font-weight", "600").text(d.data.name);
      g.append("text").attr("x", 8).attr("y", 32).style("font-size", "10px").style("opacity", 0.8).text(d.value);
    }
  });
}

window.onWSData = function(data, error) {
  if (error) { render(null); return; }
  render(buildRoot(data));
};

window.addEventListener("resize", function() {
  if (lastDataRoot) render(null);
});
</script>
</body>
</html>
